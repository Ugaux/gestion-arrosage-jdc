[WIFI]
access-point=JardinDuCiel-Arrosage:: ; SSID:Password

[relays]
modules=gpio-1
gpio-1=GPIO-H(4), GPIO-H(14), GPIO-H(15), GPIO-H(16), GPIO-H(17), GPIO-H(18)

[valve]
main=gpio-1.0

[zones]
zones=Serre, Noémie, Aromatiques

[Serre]
ways=Tout(gpio-1.1)

[Noémie]
ways=Oscillant(gpio-1.2), Goutteurs(gpio-1.3)

[Aromatiques]
ways=Tout(gpio-1.4)

[manual]
duration=10

[moisture]
sensor=32
max=60

[flow]
sensor=39
max=10
