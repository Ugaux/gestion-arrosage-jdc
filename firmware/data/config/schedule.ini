; Template: scheduleX=Hour:Minutes,Duration,OnlyIfDrySoil,Frequency

; X: schedule index (from 1 to MAX_SCHEDULE in "constants.h")

; Frequency:
; * Every days
; e Even days   (2, 4, 6, ..., 30)
; o Odd days    (1, 3, 5, ..., 31)
; c Custom days (Sun -> 0)
;               (Mon -> 1)
;               (Tue -> 2)
;               (Wed -> 3)
;               (Thu -> 4)
;               (Fri -> 5)
;               (Sat -> 6)
; Example : schedule1=06:30,15,0,c,(Mon-Wed-Fri-Sat)